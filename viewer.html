<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Deals Viewer</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .controls { display: flex; gap: 1.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #ccc;
    }
    .name { flex: 1; }
    .right { margin-left: 1rem; text-align: right; white-space: nowrap; }
    .expiry { font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>

<h2>Deals Viewer</h2>

<div class="controls">
  <label><input type="checkbox" id="show-active" checked onchange="render()"> Active</label>
  <label><input type="checkbox" id="show-expired" onchange="render()"> Expired</label>
  <select id="category-filter" onchange="render()">
    <option value="">All Categories</option>
  </select>
</div>

<ul id="list"></ul>

<script>
  let data = { active: [], expired: [] };

  fetch('deals.json')
    .then(r => r.json())
    .then(json => {
      data = json;
      const all = [...data.active, ...data.expired];
      const cats = [...new Set(all.map(i => i.category).filter(Boolean))].sort();
      const sel = document.getElementById('category-filter');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
      render();
    })
    .catch(() => {
      document.getElementById('list').innerHTML = '<li>Could not load deals.json. Run safeway_visualization.py first.</li>';
    });

  function formatPrice(item) {
    return [item.pre_price_text, item.sale_price, item.post_price_text].filter(Boolean).join(' ') || item.regular_price || '—';
  }

  function sortAlpha(arr) {
    return arr.slice().sort((a, b) => a.name.localeCompare(b.name));
  }

  function render() {
    const showActive  = document.getElementById('show-active').checked;
    const showExpired = document.getElementById('show-expired').checked;
    const cat = document.getElementById('category-filter').value;

    let active  = showActive  ? sortAlpha(data.active)  : [];
    let expired = showExpired ? sortAlpha(data.expired) : [];

    if (cat) {
      active  = active.filter(i => i.category === cat);
      expired = expired.filter(i => i.category === cat);
    }

    const items = [...active, ...expired];

    document.getElementById('list').innerHTML = items.length
      ? items.map(item => `
          <li>
            <span class="name">
              ${item.name || '—'}
              ${item.sale_desc ? `<br><small style="color:#888">${item.sale_desc}</small>` : ''}
            </span>
            <span class="right">
              <div>${formatPrice(item)}</div>
              <div class="expiry">expires ${item.end_date}</div>
            </span>
          </li>
        `).join('')
      : '<li>No items found.</li>';
  }
</script>
</body>
</html>
